name: Semgrep

on:
  workflow_dispatch:
  push:
    branches: ["develop"]
  pull_request:
    branches: ["develop"]

permissions:
  contents: read

jobs:
  semgrep:
    name: Optional Semgrep Scan
    if: github.event_name == 'workflow_dispatch' || vars.SEMGREP_ENABLED == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true

      - name: Run Semgrep
        continue-on-error: ${{ vars.SEMGREP_BLOCKING != 'true' }}
        run: uvx semgrep scan --config p/python --config p/security-audit --sarif --output semgrep.sarif

      - name: Upload SARIF
        if: always() && hashFiles('semgrep.sarif') != ''
        uses: github/codeql-action/upload-sarif@ed410739ba306e4ebe5e123421a6bd694e494a2b
        with:
          sarif_file: semgrep.sarif
