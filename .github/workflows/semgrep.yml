name: Semgrep

on:
  workflow_dispatch:
  push:
    branches: ["develop"]
  pull_request:
    branches: ["develop"]

permissions:
  contents: read
  security-events: write

jobs:
  semgrep:
    name: Optional Semgrep Scan
    if: github.event_name == 'workflow_dispatch' || vars.SEMGREP_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Semgrep
        run: python -m pip install semgrep

      - name: Run Semgrep
        continue-on-error: ${{ vars.SEMGREP_BLOCKING != 'true' }}
        run: semgrep scan --config p/python --config p/security-audit --sarif --output semgrep.sarif

      - name: Upload SARIF
        if: always() && hashFiles('semgrep.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
