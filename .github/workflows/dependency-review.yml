name: Dependency Review

on:
  workflow_dispatch:
  pull_request:
    branches: ["develop"]

permissions:
  contents: read

jobs:
  dependency-review:
    if: github.event_name == 'workflow_dispatch' || vars.DEPENDENCY_REVIEW_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Dependency Review
        uses: actions/dependency-review-action@e46ed2cbd01164d986452f91f178727624ae40d7
        with:
          fail-on-severity: high
          deny-licenses: GPL-3.0, AGPL-3.0
