# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: en-US
tone_instructions: "Be concise, evidence-focused, and privacy-aware. Prioritize correctness, security, test coverage, and local-first data handling. In src/alcove_dux, focus on privacy boundaries, report-safe IDs, deterministic behavior, and benchmarkable evidence quality. In docs, flag any private paths, private infrastructure names, raw document text, or unsupported misconduct-decision language. In tests, prefer focused coverage for privacy, offsets, calibration, and false-positive behavior."

reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: true
  path_filters:
    - "!data/**"
    - "!reports/**"
    - "!dist/**"
    - "!build/**"
